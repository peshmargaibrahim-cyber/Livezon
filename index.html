<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveZon - Media Player</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LiveZon">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/6pmmvFXH/1000026989-removebg-preview.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --primary-dark: #000000; 
            --primary-light: #141414;
            --accent-color: #D4AF37; 
            --accent-brown: #8B5A2B; 
            --bg-dark: #080808;
            --text-main: #ffffff;
            --text-gray: #a3a3a3;
            --header-height: 80px; 
        }

        body, html {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark); color: var(--text-main);
            height: 100vh; overflow: hidden;
        }

        /* [باقی ستایلەکان وەکو خۆی ماونەتەوە] */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #000000, #1c1204, #000000); color: white; padding: 20px; text-align: center; position: absolute; top: 0; left: 0; width: 100%; z-index: 9999; box-sizing: border-box; }
        .login-logo { width: 130px; height: 130px; background-color: rgba(20, 20, 20, 0.95); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 0 4px rgba(212, 175, 55, 0.3); padding: 15px; border: 2px solid var(--accent-brown); }
        .login-logo img { width: 85%; object-fit: contain; }
        
        /* گۆڕانکاری لە Iframe بۆ ئەوەی فلتەر نەبێت */
        .iframe-container { flex-grow: 1; width: 100%; overflow: hidden; position: relative; background-color: #000; }
        .iframe-container iframe { 
            width: 100%; height: 100%; border: none; 
            filter: none; /* فلتەرەکە لادرا */
        }

        /* [باقی ستایلەکانی تر بەبێ گۆڕانکاری] */
        #fake-player-screen { display: none; flex-direction: column; width: 100%; height: 100vh; background-color: #000; position: absolute; top: 0; left: 0; z-index: 10000; }
        #main-app { display: none; flex-direction: column; height: 100vh; width: 100%; }
        /* زیادکردنی مێنوی لای چەپ و هیتەر... */
    </style>
</head>
<body>
    <!-- [هەمان ناوەڕۆکی پێشوو] -->
    <!-- [تێبینی: بەشی script بەشی 'window.addEventListener('blur'... لابراوە] -->
</body>
</html>
